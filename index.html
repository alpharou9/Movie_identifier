<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Movie Identifier</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
            background: #f8f9ff;
        }
        
        .upload-area:hover {
            background: #e8ebff;
            border-color: #764ba2;
            transform: translateY(-2px);
        }
        
        .upload-area.dragover {
            background: #d8e0ff;
            border-color: #764ba2;
            transform: scale(1.02);
        }
        
        input[type="file"] {
            display: none;
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            color: #666;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .upload-hint {
            color: #999;
            font-size: 12px;
        }
        
        .preview-container {
            margin: 20px 0;
        }
        
        .preview-item {
            background: #f8f9ff;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        
        .preview-image {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            margin-bottom: 10px;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .result h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 16px;
        }
        
        .result-content {
            white-space: pre-wrap;
            font-family: inherit;
            color: #333;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            color: #666;
            font-size: 14px;
        }
        
        .error {
            background: #fee;
            border-left-color: #f44;
        }
        
        .error-text {
            color: #c33;
        }
        
        .clear-btn {
            background: #f44;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 20px;
            width: 100%;
            transition: background 0.3s;
        }
        
        .clear-btn:hover {
            background: #d33;
        }
        
        .confidence-high {
            color: #28a745;
            font-weight: bold;
        }
        
        .confidence-medium {
            color: #ffc107;
            font-weight: bold;
        }
        
        .confidence-low {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Movie Identifier</h1>
        <p class="subtitle">Upload screenshots from TikTok, YouTube, or Instagram!</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📷</div>
            <p class="upload-text">Click to upload or drag & drop</p>
            <p class="upload-hint">Supports JPG, PNG • Multiple images allowed</p>
            <input type="file" id="fileInput" accept="image/*" multiple>
        </div>
        
        <div id="previewContainer"></div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('previewContainer');

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // File selection handler
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            // Add clear button if not already present
            if (!document.getElementById('clearBtn')) {
                const clearBtn = document.createElement('button');
                clearBtn.id = 'clearBtn';
                clearBtn.className = 'clear-btn';
                clearBtn.textContent = 'Clear All Results';
                clearBtn.onclick = clearResults;
                previewContainer.appendChild(clearBtn);
            }
            
            Array.from(files).forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    processImage(file, Date.now() + index);
                }
            });
        }

        function clearResults() {
            previewContainer.innerHTML = '';
            fileInput.value = '';
        }

        async function processImage(file, uniqueId) {
            const reader = new FileReader();
            
            reader.onload = async (e) => {
                // Create preview container
                const previewDiv = document.createElement('div');
                previewDiv.className = 'preview-item';
                previewDiv.id = `preview-${uniqueId}`;
                previewDiv.innerHTML = `
                    <img src="${e.target.result}" class="preview-image" alt="Screenshot">
                    <div class="loading" id="loading-${uniqueId}">
                        <div class="spinner"></div>
                        <p class="loading-text">Analyzing movie...</p>
                    </div>
                    <div class="result" id="result-${uniqueId}" style="display: none;"></div>
                `;
                
                // Insert at the beginning (newest first)
                const clearBtn = document.getElementById('clearBtn');
                if (clearBtn) {
                    previewContainer.insertBefore(previewDiv, clearBtn);
                } else {
                    previewContainer.appendChild(previewDiv);
                }
                
                // Call API
                try {
                    const response = await fetch('http://192.168.1.16:5000/identify', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            image: e.target.result
                        })
                    });
                    
                    const data = await response.json();
                    
                    // Hide loading
                    document.getElementById(`loading-${uniqueId}`).style.display = 'none';
                    
                    // Show result
                    const resultDiv = document.getElementById(`result-${uniqueId}`);
                    resultDiv.style.display = 'block';
                    
                    if (data.success) {
                        // Format the result nicely
                        let formattedResult = data.result;
                        
                        // Add color coding for confidence
                        formattedResult = formattedResult.replace(
                            /CONFIDENCE: (High|Medium|Low)/gi,
                            (match, level) => {
                                const className = `confidence-${level.toLowerCase()}`;
                                return `CONFIDENCE: <span class="${className}">${level}</span>`;
                            }
                        );
                        
                        resultDiv.innerHTML = `
                            <h3>✨ Identified!</h3>
                            <div class="result-content">${formattedResult}</div>
                        `;
                    } else {
                        resultDiv.className = 'result error';
                        resultDiv.innerHTML = `
                            <h3>❌ Error</h3>
                            <p class="error-text">${data.error}</p>
                        `;
                    }
                    
                } catch (error) {
                    document.getElementById(`loading-${uniqueId}`).style.display = 'none';
                    const resultDiv = document.getElementById(`result-${uniqueId}`);
                    resultDiv.style.display = 'block';
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Connection Error</h3>
                        <p class="error-text">Could not connect to server. Make sure the backend is running on http://localhost:5000</p>
                        <p class="error-text" style="font-size: 12px; margin-top: 10px;">Error: ${error.message}</p>
                    `;
                }
            };
            
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
